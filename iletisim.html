<body class="bg-light">

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

            <div class="collapse navbar-collapse" id="navbarNav">

    <header class="text-white text-center py-5 mb-5 shadow-sm" style="background: linear-gradient(135deg, #fd7e14, #ffc107);">
        <div class="container py-3">
            <h1 class="display-4 fw-bold">İletişim</h1>
            <p class="lead mb-0 text-dark">Benimle iletişime geçin</p>
        </div>
    </header>

    <main class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0 p-4">
                    
                    <div id="hataKutusu" class="alert alert-danger d-none" role="alert"></div>

                    <form action="iletisim_sonuc.php" method="POST" onsubmit="return formKontrol(event)">
                        
                        <div class="mb-3">
                            <label for="isim" class="form-label">Adınız Soyadınız</label>
                            <input type="text" class="form-control" id="isim" name="isim" placeholder="Adınızı giriniz">
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">E-posta Adresiniz</label>
                            <input type="text" class="form-control" id="email" name="email" placeholder="ornek@mail.com">
                        </div>
                        
                        <div class="mb-3">
                            <label for="mesaj" class="form-label">Mesajınız</label>
                            <textarea class="form-control" id="mesaj" name="mesaj" rows="5" placeholder="Mesajınızı buraya yazınız"></textarea>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="reset" class="btn btn-secondary w-50 fw-bold" onclick="hataGizle()">Temizle</button>
                            <button type="submit" class="btn btn-warning w-50 fw-bold">Gönder</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 text-muted border-top bg-white">
        <p class="mb-0">&copy; 2026 Görkem Polat | Web Teknolojileri Projesi</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function formKontrol(event) {
            // Form elemanlarını al
            let isim = document.getElementById("isim").value.trim();
            let email = document.getElementById("email").value.trim();
            let mesaj = document.getElementById("mesaj").value.trim();
            let hataKutusu = document.getElementById("hataKutusu");
            
            let hatalar = []; // Hataları biriktireceğimiz dizi

            // 1. İsim Kontrolü (Boş olamaz ve en az 3 karakter olmalı)
            if (isim === "") {
                hatalar.push("• Ad Soyad alanı boş bırakılamaz.");
            } else if (isim.length < 3) {
                hatalar.push("• Ad Soyad en az 3 karakterden oluşmalıdır.");
            }

            // 2. E-posta Kontrolü (Boş olamaz, @ ve . içermeli)
            if (email === "") {
                hatalar.push("• E-posta alanı boş bırakılamaz.");
            } else if (!email.includes("@") || !email.includes(".")) {
                hatalar.push("• Lütfen geçerli bir e-posta adresi giriniz (Örn: ornek@mail.com).");
            }

            // 3. Mesaj Kontrolü
            if (mesaj === "") {
                hatalar.push("• Mesaj alanı boş bırakılamaz.");
            }

            // Eğer hata varsa formu durdur ve ekrana yazdır
            if (hatalar.length > 0) {
                event.preventDefault(); // Formun PHP'ye gitmesini engeller
                hataKutusu.innerHTML = hatalar.join("<br>"); // Hataları alt alta yaz
                hataKutusu.classList.remove("d-none"); // Hata kutusunu görünür yap
                return false;
            }

            // Hata yoksa formun gitmesine izin ver
            return true;
        }

        // Temizle butonuna basınca hata mesajlarını gizleyen fonksiyon
        function hataGizle() {
            let hataKutusu = document.getElementById("hataKutusu");
            hataKutusu.classList.add("d-none");
            hataKutusu.innerHTML = "";
        }
    </script>
</body>
</html>
