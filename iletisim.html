<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görkem Polat - İletişim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-expand-lg bg-dark sticky-top" data-bs-theme="dark">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 fs-5">
                    <li class="nav-item"><a class="nav-link" href="index.html">Ana Sayfa</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Özgeçmiş</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehrim.html">Şehrim</a></li>
                    <li class="nav-item"><a class="nav-link" href="miras.html">Takımımız</a></li>
                    <li class="nav-item"><a class="nav-link" href="ilgi.html">İlgi Alanlarım</a></li>
                    <li class="nav-item"><a class="nav-link active" href="iletisim.html">İletişim</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Giriş Yap</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="text-white text-center py-5 mb-4 shadow-sm" style="background: linear-gradient(135deg, #fd7e14, #ffc107);">
        <div class="container py-3">
            <h1 class="display-4 fw-bold"><i class="fa-solid fa-paper-plane me-3"></i>İletişim</h1>
            <p class="lead mb-0 text-dark fw-bold">Benimle iletişime geçmek için formu doldurabilirsiniz.</p>
        </div>
    </header>

    <main class="container mb-5" id="vueApp">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-lg border-0 p-4 p-md-5">
                    
                    <div id="jsHataKutusu" class="alert alert-danger d-none mb-4 shadow-sm" role="alert"></div>
                    
                    <div v-if="vueHatalari.length > 0" class="alert alert-warning mb-4 shadow-sm" role="alert">
                        <h6 class="fw-bold text-danger"><i class="fa-solid fa-triangle-exclamation me-2"></i>Vue.js Hata Denetimi:</h6>
                        <ul class="mb-0 text-dark">
                            <li v-for="hata in vueHatalari" :key="hata">{{ hata }}</li>
                        </ul>
                    </div>

                    <form action="iletisim_sonuc.php" method="POST" id="iletisimFormu">
                        
                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Adınız Soyadınız</label>
                                <input type="text" class="form-control bg-light border-secondary" id="isim" name="isim" v-model="form.isim" placeholder="Ad Soyad">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">E-posta Adresi</label>
                                <input type="email" class="form-control bg-light border-secondary" id="email" name="email" v-model="form.email" placeholder="ornek@mail.com">
                            </div>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Telefon (Sadece Rakam)</label>
                                <input type="text" class="form-control bg-light border-secondary" id="telefon" name="telefon" v-model="form.telefon" placeholder="05XXXXXXXXX">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Konu Seçimi</label>
                                <select class="form-select bg-light border-secondary" id="konu" name="konu" v-model="form.konu">
                                    <option value="">Seçiniz...</option>
                                    <option value="Soru">Soru</option>
                                    <option value="Öneri">Öneri</option>
                                    <option value="İş Birliği">İş Birliği</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3 border rounded p-3 bg-light border-secondary">
                            <label class="form-label fw-bold d-block">Cinsiyet</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input border-secondary" type="radio" name="cinsiyet" id="erkek" value="Erkek" v-model="form.cinsiyet">
                                <label class="form-check-label" for="erkek">Erkek</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input border-secondary" type="radio" name="cinsiyet" id="kadin" value="Kadın" v-model="form.cinsiyet">
                                <label class="form-check-label" for="kadin">Kadın</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Mesajınız</label>
                            <textarea class="form-control bg-light border-secondary" id="mesaj" name="mesaj" rows="4" v-model="form.mesaj" placeholder="Mesajınızı buraya yazınız..."></textarea>
                        </div>
                        
                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input border-secondary" id="onay" name="onay" v-model="form.onay">
                            <label class="form-check-label small text-muted" for="onay">Verdiğim bilgilerin doğruluğunu kabul ediyorum.</label>
                        </div>

                        <hr class="mb-4 border-secondary">

                        <div class="d-grid gap-2 d-md-flex justify-content-center">
                            <button type="button" class="btn btn-secondary px-4 fw-bold shadow-sm" onclick="formuTemizle()">Temizle</button>
                            
                            <button type="button" class="btn btn-dark px-4 fw-bold shadow-sm" onclick="vanillaJsDogrula()">
                                <i class="fa-brands fa-js me-1 text-warning"></i> JS ile Gönder
                            </button>
                            
                            <button type="button" class="btn btn-success px-4 fw-bold shadow-sm" @click="vueJsDogrula">
                                <i class="fa-brands fa-vuejs me-1 text-dark"></i> Vue ile Gönder
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 text-muted border-top bg-white mt-auto">
        <p class="mb-0">&copy; 2026 Görkem Polat | Web Teknolojileri Projesi</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // =====================================
        // 1. VANILLA JS (NORMAL JS) DENETİMİ
        // =====================================
        function vanillaJsDogrula() {
            // Önce Vue hatalarını ekrandan gizle
            if(vueAppInstance) { vueAppInstance.vueHatalari = []; }
            
            // Değerleri DOM'dan çek
            let isim = document.getElementById("isim").value.trim();
            let email = document.getElementById("email").value.trim();
            let telefon = document.getElementById("telefon").value.trim();
            let konu = document.getElementById("konu").value;
            let mesaj = document.getElementById("mesaj").value.trim();
            let onay = document.getElementById("onay").checked;
            
            // Cinsiyet radio kontrolü
            let cinsiyetSecili = false;
            let radios = document.getElementsByName("cinsiyet");
            for(let i=0; i<radios.length; i++){
                if(radios[i].checked) { cinsiyetSecili = true; break; }
            }

            let hataKutusu = document.getElementById("jsHataKutusu");
            let hatalar = [];

            // Kurallar
            if (isim === "" || isim.length < 3) hatalar.push("• Ad Soyad alanı boş olamaz ve en az 3 karakter olmalıdır.");
            if (email === "" || !email.includes("@") || !email.includes(".")) hatalar.push("• Geçerli bir e-posta adresi giriniz.");
            
            let sadeceRakam = /^[0-9]+$/;
            if (telefon === "" || !sadeceRakam.test(telefon)) hatalar.push("• Telefon alanı sadece rakamlardan oluşmalıdır.");
            
            if (konu === "") hatalar.push("• Lütfen bir konu seçiniz.");
            if (!cinsiyetSecili) hatalar.push("• Lütfen cinsiyet seçiniz.");
            if (mesaj === "") hatalar.push("• Mesaj alanı boş bırakılamaz.");
            if (!onay) hatalar.push("• Bilgilerin doğruluğunu onaylayan kutucuğu işaretleyiniz.");

            // Hata varsa yazdır, yoksa POST et
            if (hatalar.length > 0) {
                hataKutusu.innerHTML = "<h6 class='fw-bold text-dark'><i class='fa-solid fa-triangle-exclamation me-2'></i>Vanilla JS Hata Denetimi:</h6>" + hatalar.join("<br>");
                hataKutusu.classList.remove("d-none");
            } else {
                hataKutusu.classList.add("d-none");
                document.getElementById("iletisimFormu").submit();
            }
        }

        // Temizle Butonu (Hem form içini hem hataları temizler)
        function formuTemizle() {
            document.getElementById("iletisimFormu").reset();
            document.getElementById("jsHataKutusu").classList.add("d-none");
            if(vueAppInstance) { 
                vueAppInstance.vueHatalari = []; 
                vueAppInstance.form = { isim: '', email: '', telefon: '', konu: '', cinsiyet: '', mesaj: '', onay: false };
            }
        }

        // =====================================
        // 2. VUE.JS DENETİMİ
        // =====================================
        const app = Vue.createApp({
            data() {
                return {
                    form: {
                        isim: '',
                        email: '',
                        telefon: '',
                        konu: '',
                        cinsiyet: '',
                        mesaj: '',
                        onay: false
                    },
                    vueHatalari: []
                }
            },
            methods: {
                vueJsDogrula() {
                    // Normal JS hatalarını kapat
                    document.getElementById("jsHataKutusu").classList.add("d-none");
                    this.vueHatalari = [];

                    // Kurallar
                    if (!this.form.isim || this.form.isim.length < 3) this.vueHatalari.push("Ad Soyad alanı boş olamaz ve en az 3 karakter olmalıdır.");
                    if (!this.form.email || !this.form.email.includes("@")) this.vueHatalari.push("Geçerli bir e-posta adresi giriniz.");
                    
                    let sadeceRakam = /^[0-9]+$/;
                    if (!this.form.telefon || !sadeceRakam.test(this.form.telefon)) this.vueHatalari.push("Telefon alanı sadece rakamlardan oluşmalıdır.");
                    
                    if (!this.form.konu) this.vueHatalari.push("Lütfen bir konu seçiniz.");
                    if (!this.form.cinsiyet) this.vueHatalari.push("Lütfen cinsiyet seçiniz.");
                    if (!this.form.mesaj) this.vueHatalari.push("Mesaj alanı boş bırakılamaz.");
                    if (!this.form.onay) this.vueHatalari.push("Bilgilerin doğruluğunu onaylayan kutucuğu işaretleyiniz.");

                    // Hata yoksa submit et
                    if (this.vueHatalari.length === 0) {
                        document.getElementById("iletisimFormu").submit();
                    }
                }
            }
        });
        
        const vueAppInstance = app.mount('#vueApp');
    </script>
</body>
</html>
